<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secret Notes Vault</title>
    <link rel="stylesheet" href="../css/home.css" />
  </head>

  <body>
    <nav class="navbar">
      <div class="logo">🔐 Secret Vault</div>
      <div class="auth-buttons">
        <a href="./signin.html"> <button class="signin-btn">Signin</button></a>
        <a href="./login.html"> <button class="logout-btn">Login</button></a>
      </div>
    </nav>

    <section class="welcome-box">
      <h1>Welcome, 👋</h1>
      <p>Your private notes are safe inside the vault.</p>
    </section>

    <section class="notes-section">
      <div class="notes-header">
        <h2>Your Notes</h2>
        <button class="add-note-btn">+ Add Note</button>
      </div>

      <div class="notes-container">
        <div class="note-card">
          <h3>Learn JWT</h3>
          <p>Understand authentication flow using cookies and middleware.</p>

          <div class="card-buttons">
            <button class="edit-btn">Edit</button>
            <button class="delete-btn">Delete</button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
